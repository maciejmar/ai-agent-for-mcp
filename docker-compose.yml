services:
  backend:
    build:
      context: ./backend
      secrets:
        - pip_conf
    container_name: diagnostic-agent-backend
    restart: unless-stopped
    environment:
      MCP_ALLOWED_LOG_PATHS: /app/sample_app.log,/host/var/log/app.log
      BACKEND_CORS_ORIGINS: ${BACKEND_CORS_ORIGINS:-http://localhost:8012,http://127.0.0.1:8012}
      REMOTE_MCP_ENABLED: ${REMOTE_MCP_ENABLED:-true}
      MCP_SERVER_URL: ${MCP_SERVER_URL:-http://host.docker.internal:8010/mcp}
      MCP_API_KEY: ${MCP_API_KEY:-dev-mcp-key}
      MCP_CLIENT_TIMEOUT_SECONDS: ${MCP_CLIENT_TIMEOUT_SECONDS:-20}
      OLLAMA_ENABLED: ${OLLAMA_ENABLED:-true}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.1}
      OLLAMA_TIMEOUT_SECONDS: ${OLLAMA_TIMEOUT_SECONDS:-30}
    volumes:
      - ./backend/sample_app.log:/app/sample_app.log:ro
      # Linux host example:
      # - /var/log/app.log:/host/var/log/app.log:ro
    expose:
      - "8000"
    networks:
      - diagnostic-agent
      - ollama-network
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)"]
      interval: 15s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
      network: host
      secrets:
        - ca_cert
        - npmrc
    container_name: diagnostic-agent-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${DIAGNOSTIC_FRONTEND_PORT:-8012}:80"
    networks:
      - diagnostic-agent

networks:
  diagnostic-agent:
    name: ${DIAGNOSTIC_NETWORK:-diagnostic-agent}
  ollama-network:
    external: true
    name: ${OLLAMA_NETWORK:-ollama-network}

secrets:
  pip_conf:
    file: /etc/pip.conf
  ca_cert:
    file: /etc/pki/ca-trust/source/anchors/bank-jfrog-ca.crt
  npmrc:
    file: /root/.npmrc
